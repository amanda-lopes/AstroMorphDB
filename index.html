<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astromorphlib Database</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 20px;
            background-color: #0a0f1e;
            color: #e0e0e0;
        }
        
        h1 {
            color: #ffd966;
            border-bottom: 2px solid #4a6fa5;
            padding-bottom: 10px;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #1a1f2e;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            overflow: hidden;
        }
        
        th {
            background-color: #2d3b4f;
            color: #ffd966;
            font-weight: 600;
            padding: 12px;
            text-align: left;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            user-select: none;
        }
        
        th:hover {
            background-color: #3d4b5f;
        }
        
        th:after {
            content: ' ↕️';
            font-size: 0.8em;
            opacity: 0.5;
        }
        
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #2a3440;
            font-size: 0.9em;
        }
        
        tr:hover {
            background-color: #252e3f;
        }
        
        .coordinates {
            font-family: 'Courier New', monospace;
            color: #9cd9f0;
        }
        
        .z {
            color: #b5e6b5;
            font-weight: 500;
        }
        
        .footer {
            margin-top: 20px;
            text-align: right;
            color: #888;
            font-size: 0.8em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌌 Astromorphlib Database</h1>
        
        <div style="overflow-x: auto;">
            <table id="objectsTable">
                <thead>
                    <tr>
                        <th onclick="sortTable(0)">Name</th>
                        <th onclick="sortTable(1)">RA (degrees)</th>
                        <th onclick="sortTable(2)">DEC (degrees)</th>
                        <th onclick="sortTable(3)">z</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 50px;">
                            Loading...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <div class="footer">
            <span id="objectCount">0</span> objects · <span id="lastUpdated"></span>
        </div>
    </div>

    <script>
        let objects = [];
        let sortColumn = -1;
        let sortDirection = 'asc';

        async function loadCSV() {
            const response = await fetch('data.csv');
            const csvText = await response.text();
            
            const rows = csvText.trim().split('\n');
            const headers = rows[0].split(',').map(h => h.trim());
            
            objects = rows.slice(1).map(row => {
                const values = row.split(',').map(v => v.trim());
                return headers.reduce((obj, header, index) => {
                    obj[header] = values[index];
                    return obj;
                }, {});
            });
            
            displayData(objects);
            document.getElementById('lastUpdated').innerHTML = new Date().toLocaleString();
            document.getElementById('objectCount').textContent = objects.length;
        }

        function displayData(data) {
            const tableBody = document.getElementById('tableBody');
            
            let html = '';
            data.forEach(item => {
                html += '<tr>';
                html += `<td>${item.Name || ''}</td>`;
                html += `<td class="coordinates">${item['RA(degrees)'] || ''}</td>`;
                html += `<td class="coordinates">${item['DEC(degrees)'] || ''}</td>`;
                html += `<td class="z">${item.z || ''}</td>`;
                html += '</tr>';
            });
            
            tableBody.innerHTML = html;
            document.getElementById('objectCount').textContent = data.length;
        }

        function sortTable(columnIndex) {
            const headers = ['Name', 'RA(degrees)', 'DEC(degrees)', 'z'];
            
            if (sortColumn === columnIndex) {
                sortDirection = sortDirection === 'asc' ? 'desc' : 'asc';
            } else {
                sortColumn = columnIndex;
                sortDirection = 'asc';
            }
            
            const columnName = headers[columnIndex];
            
            objects.sort((a, b) => {
                let valA = a[columnName];
                let valB = b[columnName];
                
                if (columnIndex >= 1) {
                    valA = parseFloat(valA) || 0;
                    valB = parseFloat(valB) || 0;
                } else {
                    valA = String(valA).toLowerCase();
                    valB = String(valB).toLowerCase();
                }
                
                if (valA < valB) return sortDirection === 'asc' ? -1 : 1;
                if (valA > valB) return sortDirection === 'asc' ? 1 : -1;
                return 0;
            });
            
            displayData(objects);
        }

        window.onload = loadCSV;
    </script>
</body>
</html>
